server:
  port: 8080

spring:
  application:
    name: bug-bash

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080

  datasource:
    password: bug_bash
    username: bug_bash
    url: jdbc:postgresql://localhost:5432/bug_bash
    driver-class-name: org.postgresql.Driver
  
  sql:
    init:
      mode: never

ollama:
  model: "codellama"  # This is the default value
  #url: "http://ollama:11434"
  url: "http://localhost:11434"




logging:
  level:
    org.flywaydb: DEBUG