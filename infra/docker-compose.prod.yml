services:
  postgres:
    image: postgres:16
    container_name: devroast_postgres_prod
    environment:
      POSTGRES_DB: bug_bash
      POSTGRES_USER: bug_bash
      POSTGRES_PASSWORD: bug_bash
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: devroast_ollama_prod
    ports:
      - "11434:11434"
    volumes:
      - ollama_data_prod:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 10
        ollama pull codellama
        wait

  backend:
    container_name: devroast_backend_prod
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bug_bash
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: codellama

  frontend:
    container_name: devroast_frontend_prod
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "4173:80"
    depends_on:
      - backend

volumes:
  postgres_data_prod:
  ollama_data_prod:
